<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>PrimePC Project Overview</title>
    <style>
        :root {
            --paper: #ffffff;
            --paper-soft: #f8fafc;
            --ink: #0f172a;
            --muted: #475569;
            --line: #dbe3ee;
            --accent: #0f766e;
            --accent-soft: #ccfbf1;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Noto Sans Thai", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        }

        .display-font {
            font-family: "Chakra Petch", sans-serif;
        }

        .document-frame {
            position: relative;
            background: var(--paper);
            border: 1px solid var(--line);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }

        .document-frame::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(to bottom, rgba(15, 118, 110, 0.03), transparent 140px);
        }

        .document-header {
            position: relative;
            border-bottom: 2px solid var(--line);
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .document-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 0.35rem 0.8rem;
            font-size: 0.875rem;
            color: var(--accent);
            background: var(--accent-soft);
            letter-spacing: 0.02em;
        }

        .document-title {
            margin: 0.85rem 0 0.35rem;
            font-size: clamp(1.7rem, 3vw, 2.4rem);
            line-height: 1.15;
            font-weight: 700;
            color: var(--ink);
        }

        .document-subtitle {
            margin: 0;
            max-width: 70ch;
            color: var(--muted);
            line-height: 1.8;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4 {
            margin-top: 1.35rem;
            margin-bottom: 0.7rem;
            line-height: 1.25;
            color: #0f172a;
        }

        .markdown-content h1 {
            margin-top: 0;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .markdown-content h2 {
            font-size: 1.4rem;
            font-weight: 700;
            border-left: 4px solid var(--accent);
            padding-left: 0.75rem;
        }

        .markdown-content h3 {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .markdown-content p {
            margin: 0.7rem 0;
            color: var(--muted);
            line-height: 1.9;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin: 0.5rem 0 1.1rem 1.35rem;
            color: var(--muted);
        }

        .markdown-content li {
            margin: 0.4rem 0;
            line-height: 1.75;
            padding-left: 0.2rem;
        }

        .markdown-content strong {
            color: #0f172a;
            font-weight: 700;
        }

        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 0.9rem;
            background: #ffffff;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid var(--line);
            padding: 0.75rem;
            text-align: left;
            vertical-align: top;
            color: var(--muted);
        }

        .markdown-content th {
            color: #0f172a;
            background: #f1f5f9;
            font-weight: 700;
        }

        .diagram-shell {
            margin-top: 2rem;
            padding: 1.15rem;
            border: 1px solid var(--line);
            border-radius: 1rem;
            background: linear-gradient(180deg, #f8fafc 0%, #ffffff 100%);
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
            overflow-x: auto;
        }

        .diagram-shell h2 {
            margin: 0 0 0.75rem;
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f172a;
        }

        .mermaid {
            display: flex;
            justify-content: center;
        }

        .document-footer {
            margin-top: 1.5rem;
            padding-top: 0.85rem;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.92rem;
        }
    </style>
</head>

<body class="min-h-screen">
    <main class="mx-auto w-full max-w-5xl px-4 py-8 sm:px-6 lg:py-12">
        <section class="document-frame overflow-hidden rounded-[1.75rem] p-6 sm:p-8 lg:p-10">
           

            <article id="markdown-output" class="markdown-content"></article>
            <section class="diagram-shell">
                <h2>System Architecture</h2>
                <div id="diagram-output" class="mermaid"></div>
            </section>

            <footer class="document-footer">
                PrimePC Project Document
            </footer>
        </section>
    </main>

    <script>
        mermaid.initialize({ startOnLoad: false });

        const markdownData = `## System Architecture`;

        const diagramData = `graph TD
    subgraph "User Actors (ผู้ใช้งานระบบ)"
        C["ลูกค้า (Customer)"]
        S["พนักงาน (Staff)"]
        A["ผู้ดูแลระบบ (Administrator)"]
    end

    subgraph "Frontend Layer (Vite + React + Tailwind)"
        UIPub["หน้าเว็บร้านค้าออนไลน์ (Public UI)"]
        UIPriv["ระบบจัดการหลังบ้าน (Back-Office UI)"]
    end

    subgraph "Backend Layer (Node.js + Express + Cors)"
        API["API Gateway / Router"]
        subgraph "Core Services & Logic"
            Auth["System Authentication"]
            Prod["Product Management"]
            Order["Order & Payment"]
            UserServ["User & Member"]
            Ticket["Claim & Ticket"]
            Mark["Marketing & Promo"]
            Report["Reporting"]
            SysLog["System Logs"]
        end
    end

    subgraph "Data Layer"
        ORM["Prisma ORM"]
        DB[("PostgreSQL (Supabase)")]
    end

    C --> UIPub
    S --> UIPriv
    A --> UIPriv
    UIPub -->|HTTP Request| API
    UIPriv -->|HTTP Request| API
    API --> Auth
    API --> Prod
    API --> Order
    API --> UserServ
    API --> Ticket
    API --> Mark
    API --> Report
    API --> SysLog
    Auth --> ORM
    Prod --> ORM
    Order --> ORM
    UserServ --> ORM
    Ticket --> ORM
    Mark --> ORM
    Report --> ORM
    SysLog --> ORM
    ORM --> DB`;

        document.getElementById("markdown-output").innerHTML = marked.parse(markdownData);
        document.getElementById("diagram-output").textContent = diagramData;
        mermaid.run({ nodes: [document.getElementById("diagram-output")] });
    </script>
</body>

</html>
